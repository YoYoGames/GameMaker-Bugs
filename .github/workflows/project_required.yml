name: Project Required

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  add-comment:
    if: github.event.label.name == 'project_required'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Triggered label: ${{ github.event.label.name }}"
          echo "Issue number: ${{ github.event.issue.number }}"

      - name: Generate App token to publish CI check
        uses: actions/create-github-app-token@v2
        id: generate-token
        with:
            app-id: ${{ secrets.AUTOMATON_APP_ID }}
            private-key: ${{ secrets.AUTOMATON_PRIVATE_KEY }}              

      - name: Check if comment already exists
        id: check_comment
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          EXISTING=$(gh issue view "$NUMBER" --json comments \
            --jq '.comments[].body' | grep -c "project-required-comment" || true)

          echo "exists=$EXISTING" >> $GITHUB_OUTPUT

      - name: Add comment
        if: steps.check_comment.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$NUMBER" --body "$(cat <<'EOF'
          <!-- project-required-comment -->

          Thanks for reporting this, but in order to confirm the problem and then investigate a fix we need you to send us small project which already shows this issue - to ensure we see exactly what you see and then learn why this problem is caused.

          Open the project inside GameMaker (and ideally recreate the problem), then use the Help menu's "Upload a Bug/Ticket Sample" tool and say yes to GameMaker privately sending us your project. Copy the download link GameMaker gives you and then paste that link here as a new comment, please.

          [Why Have You Asked Me For A Sample?](https://github.com/YoYoGames/GameMaker-Bugs/wiki/Why-Send-Sample-Projects)

          Thanks!
          EOF
          )"

      - name: Get project item id for this issue
        id: get_item
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ITEM_ID=$(python .github/workflows/actions/get_node_id.py \
            "$ISSUE_NUMBER" \
            "PVT_kwDOAFV58c4AUHyf")


          echo "Found item id: $ITEM_ID"

      - name: Add to backlog
        if: steps.get_item.outputs.item_id != ''
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh project item-edit \
            --id "${{ steps.get_item.outputs.item_id }}" \
            --field-id "PVTSSF_lADOAFV58c4AUHyfzgM2sQU" \
            --project-id "PVT_kwDOAFV58c4AUHyf" \
            --single-select-option-id "5f143608"

      - name: Remove project_required label
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          NUMBER: ${{ github.event.issue.number }}
          LABEL: ${{ github.event.label.name }}
        run: |
          gh issue edit "$NUMBER" --remove-label "$LABEL"